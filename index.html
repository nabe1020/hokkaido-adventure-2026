<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北海道冒険旅行 2026 🐻</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --sky:#1a6fa8; --forest:#2d7a3a; --orange:#e8721c; --yellow:#f5c842;
  --dark:#1a1a2e; --text:#2c2c2c; --muted:#777; --bg:#f7f5ef;
  --white:#fff; --radius:14px; --shadow:0 3px 16px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

/* HERO */
.hero{background:linear-gradient(135deg,#0d3b6e 0%,#1a6fa8 55%,#2d9c5e 100%);color:#fff;padding:44px 20px 36px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 30%,rgba(255,255,255,0.07) 0%,transparent 60%);pointer-events:none;}
.hero-icon{font-size:64px;display:block;margin-bottom:12px;}
.hero h1{font-size:28px;font-weight:900;letter-spacing:1px;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.25);}
.hero-sub{font-size:14px;opacity:.85;margin-bottom:20px;}
.hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.hbadge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:5px 14px;font-size:12px;font-weight:700;}

/* NAV */
.nav{background:var(--dark);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:200;}
.nav::-webkit-scrollbar{display:none;}
.nbtn{color:rgba(255,255,255,.55);border:none;background:none;padding:13px 18px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;}
.nbtn:hover,.nbtn.active{color:var(--yellow);border-bottom-color:var(--yellow);}

/* PAGES */
.page{display:none;max-width:820px;margin:0 auto;padding:28px 16px 60px;}
.page.active{display:block;}

/* SECTION TITLE */
.stitle{font-size:20px;font-weight:900;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

/* ROUTE MAP */
#main-map{width:100%;height:380px;border-radius:var(--radius);box-shadow:var(--shadow);}

/* TIMELINE */
.timeline{position:relative;}
.timeline::before{content:'';position:absolute;left:26px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--sky),#9b59b6,var(--forest),var(--orange));border-radius:3px;}
.tlcard{display:flex;gap:14px;margin-bottom:16px;cursor:pointer;}
.tldot{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.18);z-index:1;border:3px solid #fff;}
.tlbody{flex:1;background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);transition:transform .15s;}
.tlbody:hover{transform:translateY(-2px);}
.tldate{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px;}
.tltitle{font-size:16px;font-weight:900;margin-bottom:3px;}
.tlsub{font-size:12px;color:var(--muted);}
.tlfoot{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.tltag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;}
.tag-stay{background:#e8f4fd;color:#1a6fa8;}
.tag-warn{background:#fff8e0;color:#b8860b;}
.go-btn{margin-left:auto;background:var(--orange);color:#fff;border:none;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:800;cursor:pointer;}

/* DAY DETAIL PAGE */
.day-hero{border-radius:var(--radius);padding:24px 20px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.day-hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.18);border-radius:var(--radius);}
.day-hero-inner{position:relative;}
.day-hero-icon{font-size:48px;display:block;margin-bottom:8px;}
.day-hero h2{font-size:22px;font-weight:900;margin-bottom:4px;}
.day-hero-sub{font-size:13px;opacity:.9;}
.back-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:999px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-block;}

/* DAY MAP */
.day-map-wrap{width:100%;height:260px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}

/* SPOT CARDS */
.spots-title{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.spot-grid{display:grid;gap:10px;margin-bottom:24px;}
.spot-card{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start;}
.spot-emoji-wrap{font-size:32px;flex-shrink:0;width:44px;text-align:center;}
.spot-info{flex:1;}
.spot-name{font-size:14px;font-weight:900;margin-bottom:2px;}
.spot-desc{font-size:12px;color:var(--muted);margin-bottom:6px;}
.spot-meta{display:flex;gap:6px;flex-wrap:wrap;}
.smeta{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;}
.smeta-time{background:#f0f0f0;color:#555;}
.smeta-cost{background:#e8f5ea;color:#2d7a3a;}
.smeta-must{background:#fdeaea;color:#c0392b;}
.smeta-tip{background:#fff8e0;color:#b8860b;}

/* FOOD SECTION IN DAY */
.food-list-day{display:grid;gap:8px;margin-bottom:24px;}
.food-item-day{background:var(--white);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;}
.fday-emoji{font-size:24px;flex-shrink:0;}
.fday-name{font-size:13px;font-weight:800;}
.fday-shop{font-size:12px;color:var(--sky);font-weight:600;}
.fday-note{font-size:11px;color:var(--muted);}
.fday-check{font-size:22px;cursor:pointer;flex-shrink:0;margin-left:auto;}

/* STAY CARD */
.stay-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center;margin-bottom:24px;}
.stay-icon{font-size:36px;flex-shrink:0;}
.stay-info .stay-name{font-size:15px;font-weight:900;margin-bottom:3px;}
.stay-info .stay-meta{font-size:12px;color:var(--muted);}
.stay-status{margin-left:auto;font-size:13px;font-weight:800;padding:5px 14px;border-radius:999px;}
.stay-ok{background:#e8f5ea;color:#2d7a3a;}
.stay-warn{background:#fff8e0;color:#b8860b;}

/* CHECKLIST / PACKING */
.clist-section{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.clist-title{font-size:14px;font-weight:900;margin-bottom:10px;}
.citem{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.citem:last-child{border-bottom:none;}
.citem.done{opacity:.45;}
.citem.done .clabel{text-decoration:line-through;}
.cbox{width:22px;height:22px;border:2px solid #ccc;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:.15s;}
.citem.done .cbox{background:var(--forest);border-color:var(--forest);color:#fff;}
.clabel{font-size:13px;flex:1;}
.cnote{font-size:11px;color:var(--muted);}
.prog-wrap{background:#e8e4d8;border-radius:999px;height:7px;margin-bottom:18px;overflow:hidden;}
.prog-bar{height:7px;border-radius:999px;transition:width .4s;}
.prog-label{font-size:12px;color:var(--muted);margin-bottom:5px;}

/* PACKING GRID */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pack-cat{background:var(--white);border-radius:12px;padding:12px;box-shadow:var(--shadow);}
.pack-cat-title{font-size:12px;font-weight:900;margin-bottom:8px;}

/* FOOD GLOBAL LIST */
.food-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.food-emoji{font-size:36px;flex-shrink:0;}
.food-title{font-size:15px;font-weight:900;margin-bottom:2px;}
.food-shop{font-size:12px;color:var(--sky);font-weight:700;margin-bottom:3px;}
.food-note{font-size:11px;color:var(--muted);}
.food-check{font-size:26px;cursor:pointer;flex-shrink:0;margin-left:auto;align-self:center;}

/* BOOKING */
.bitem{background:var(--white);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.bname{font-size:14px;font-weight:800;}
.bnote{font-size:11px;color:var(--muted);margin-top:2px;}
.bstatus{font-size:11px;font-weight:800;padding:4px 12px;border-radius:999px;white-space:nowrap;}
.bok{background:#e8f5ea;color:#2d7a3a;}
.bwarn{background:#fff8e0;color:#b8860b;}

/* MISSIONS */
.mission{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;}
.mission:hover{transform:scale(1.01);}
.mission.done{opacity:.5;}
.micon{font-size:34px;flex-shrink:0;}
.mtitle{font-size:14px;font-weight:900;}
.mdesc{font-size:11px;color:var(--muted);margin-top:2px;}
.mcheck{margin-left:auto;width:28px;height:28px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:.15s;}
.mission.done .mcheck{background:var(--forest);border-color:var(--forest);color:#fff;}

/* SAVE BTN */
.save-btn{background:var(--orange);color:#fff;border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:800;cursor:pointer;display:block;margin:16px auto;transition:.15s;}
.save-btn:hover{transform:scale(1.03);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d7a3a;color:#fff;padding:10px 24px;border-radius:999px;font-size:13px;font-weight:800;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);pointer-events:none;}

.footer{background:var(--dark);color:rgba(255,255,255,.4);text-align:center;padding:20px;font-size:11px;}

@media(max-width:500px){
  .hero h1{font-size:22px;}
  .pack-grid{grid-template-columns:1fr;}
  .day-hero h2{font-size:18px;}
}
</style>
</head>

  <div id="checklist-wrap"></div>

<!-- PACKING -->
<div id="page-packing" class="page">

  <div class="prog-label" id="pack-label">0 / 0 完了</div>
  <div class="prog-wrap"><div class="prog-bar" id="pack-bar" style="width:0%;background:linear-gradient(90deg,var(--orange),var(--yellow))"></div></div>
  <div class="pack-grid" id="pack-grid"></div>
  <button class="save-btn" onclick="saveAll()">💾 持ち物を保存</button>
</div>

<!-- MISSIONS -->
<div id="page-missions" class="page">

  <p style="font-size:12px;color:var(--muted);margin-bottom:16px">達成したらタップ！全部クリアできるかな？</p>

  <div class="prog-wrap"><div class="prog-bar" id="mission-bar" style="width:0%;background:linear-gradient(90deg,var(--orange),var(--yellow))"></div></div>
  <br>
  <div id="mission-list"></div>
  <button class="save-btn" onclick="saveAll()">💾 ミッションを保存</button>
</div>

<div class="footer">🐻 北海道冒険旅行 2026 | 父ちゃんと息子の最高の夏<br><small>チェック・ミッションはブラウザに自動保存されます</small></div>

function loadState() {
  try { return JSON.parse(localStorage.getItem('hk26') || '{}'); }
  catch { return {}; }
}
let ST = loadState();
function saveAll() {
  localStorage.setItem('hk26', JSON.stringify(ST));
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = '✅ 保存しました！';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

let dayMaps = {};
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name === 'home') setTimeout(initMainMap, 80);
}

function showDayPage(idx) {
  buildDayDetail(idx);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-day').classList.add('active');
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
  window.scrollTo(0, 0);
  setTimeout(() => initDayMap(idx), 150);
}

function goBack() {
  showPage('schedule');
  document.querySelectorAll('.nbtn')[1].classList.add('active');
}

// ===========================
// MAIN MAP
// ===========================
let mainMapInited = false;
function initMainMap() {
  if (mainMapInited) return;
  mainMapInited = true;
  const m = L.map('main-map').setView([43.5, 143.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap contributors'}).addTo(m);
  const pts = days.map(d => [d.lat, d.lng]);
  L.polyline(pts, {color:'#e8721c', weight:3, dashArray:'8,5'}).addTo(m);
  days.forEach((d, i) => {
    const icon = L.divIcon({
      html:`<div style="background:${d.color};color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${d.emoji}</div>`,
      iconSize:[36,36], iconAnchor:[18,18], className:''
    });
    L.marker([d.lat, d.lng], {icon}).bindPopup(`<b>${d.day}｜${d.date}</b><br>${d.title}`).addTo(m);
  });
}

// ===========================
// DAY MAP
// ===========================
function initDayMap(idx) {
  if (dayMaps[idx]) return;
  const d = days[idx];
  const el = document.getElementById(`dmap-${idx}`);
  if (!el) return;
  const m = L.map(`dmap-${idx}`).setView([d.lat, d.lng], d.zoom || 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap contributors'}).addTo(m);
  const bounds = [];
  d.spots.forEach((s, si) => {
    if (!s.lat || !s.lng) return;
    bounds.push([s.lat, s.lng]);
    const icon = L.divIcon({
      html:`<div style="background:${d.color};color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)">${s.emoji}</div>`,
      iconSize:[32,32], iconAnchor:[16,16], className:''
    });
    L.marker([s.lat, s.lng], {icon})
      .bindPopup(`<b>${s.emoji} ${s.name}</b><br><span style="font-size:12px">${s.desc}</span>`)
      .addTo(m);
  });
  if (bounds.length > 1) m.fitBounds(bounds, {padding:[40,40]});
  dayMaps[idx] = m;
}

// ===========================
function buildDayDetail(idx) {
  const d = days[idx];
  const prev = idx > 0 ? idx - 1 : null;
  const next = idx < days.length - 1 ? idx + 1 : null;
  let html = `
    <button class="back-btn" onclick="goBack()">← 日程一覧へ戻る</button>
    <div class="day-hero" style="background:linear-gradient(135deg,${d.color}cc,${d.color})">
      <div class="day-hero-inner">
        <span class="day-hero-icon">${d.emoji}</span>
        <h2>${d.day}｜${d.date}<br>${d.title}</h2>
        <div class="day-hero-sub">${d.sub}</div>
      </div>
    </div>

    <div class="day-map-wrap" id="dmap-${idx}"></div>

    <div class="spots-title">📍 スポット候補</div>
    <div class="spot-grid">`;

  d.spots.forEach((s, si) => {
    html += `
      <div class="spot-card">
        <div class="spot-emoji-wrap">${s.emoji}</div>
        <div class="spot-info">
          <div class="spot-name">${s.name}${s.must ? ' <span style="font-size:10px;background:#fdeaea;color:#c0392b;padding:2px 7px;border-radius:999px;font-weight:800">必見</span>' : ''}</div>
          <div class="spot-desc">${s.desc}</div>
          <div class="spot-meta">
            ${s.time ? `<span class="smeta smeta-time">⏱ ${s.time}</span>` : ''}
            ${s.cost ? `<span class="smeta smeta-cost">💴 ${s.cost}</span>` : ''}
            ${s.tips ? `<span class="smeta smeta-tip">💡 ${s.tips}</span>` : ''}
          </div>
        </div>
      </div>`;
  });

  html += `</div>`;

  if (d.food.length > 0) {
    html += `<div class="spots-title" style="margin-top:4px">🍜 この日のグルメ</div><div class="food-list-day">`;
    d.food.forEach((f, fi) => {
      const key = `f_${idx}_${fi}`;
      const done = ST[key] || false;
      html += `
        <div class="food-item-day" id="fid-${idx}-${fi}">
          <div class="fday-emoji">${f.emoji}</div>
          <div style="flex:1">
            <div class="fday-name">${f.name}</div>
            <div class="fday-shop">${f.shop}</div>
            <div class="fday-note">${f.note}</div>
          </div>
          <div class="fday-check" onclick="toggleDayFood(${idx},${fi})">${done ? '✅' : '⬜'}</div>
        </div>`;
    });
    html += `</div>`;
  }

  html += `
    <div class="spots-title" style="margin-top:4px">🏕 今夜の宿</div>
    <div class="stay-card">
      <div class="stay-icon">🏕</div>
      <div class="stay-info">
        <div class="stay-name">${d.stay}</div>
        <div class="stay-meta">${d.stayNote}</div>
      </div>
      <span class="stay-status ${d.stayOk ? 'stay-ok' : 'stay-warn'}">${d.stayOk ? '✅ 予約済み' : '⚠️ 要予約'}</span>
    </div>`;

  html += `<div style="display:flex;gap:10px;margin-top:8px;">`;
  if (prev !== null) html += `<button class="save-btn" style="flex:1;margin:0" onclick="showDayPage(${prev})">← ${days[prev].day}</button>`;
  if (next !== null) html += `<button class="save-btn" style="flex:1;margin:0;background:var(--forest)" onclick="showDayPage(${next})">${days[next].day} →</button>`;
  html += `</div>`;

  document.getElementById('day-content').innerHTML = html;
}

function toggleDayFood(di, fi) {
  const key = `f_${di}_${fi}`;
  ST[key] = !ST[key];
  const el = document.getElementById(`fid-${di}-${fi}`);
  if (el) el.querySelector('.fday-check').textContent = ST[key] ? '✅' : '⬜';
  // also update global food list if visible
  const gEl = document.getElementById(`gfood-${di}-${fi}`);
  if (gEl) gEl.querySelector('.food-check').textContent = ST[key] ? '✅' : '⬜';
  saveAll();
}

let checkTotal = 0;
function buildChecklist() {
  const wrap = document.getElementById('checklist-wrap');
  let gi = 0;
  checklistData.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'clist-section';
    sec.innerHTML = `<div class="clist-title">📋 ${cat.cat}</div>`;
    cat.items.forEach(item => {
      const key = `ck_${gi}`;
      const done = ST[key] || false;
      checkTotal++;
      const el = document.createElement('div');
      el.className = 'citem' + (done ? ' done' : '');
      el.dataset.key = key;
      el.innerHTML = `<div class="cbox">${done ? '✓' : ''}</div><div class="clabel">${item.label}</div><div class="cnote">${item.note}</div>`;
      el.addEventListener('click', function() {
        this.classList.toggle('done');
        const isDone = this.classList.contains('done');
        this.querySelector('.cbox').textContent = isDone ? '✓' : '';
        ST[this.dataset.key] = isDone;
        updateCheckProg();
        saveAll();
      });
      sec.appendChild(el);
      gi++;
    });
    wrap.appendChild(sec);
  });
  updateCheckProg();
}
function updateCheckProg() {
  const items = document.querySelectorAll('#checklist-wrap .citem');
  const done = Array.from(items).filter(el => el.classList.contains('done')).length;
  const pct = items.length ? Math.round(done / items.length * 100) : 0;
  document.getElementById('check-label').textContent = `${done} / ${items.length} 完了（${pct}%）`;
  document.getElementById('check-bar').style.width = pct + '%';
}

// ===========================
let packTotal = 0;
function buildPacking() {
  const grid = document.getElementById('pack-grid');
  let gi = 0;
  packingData.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'pack-cat';
    div.innerHTML = `<div class="pack-cat-title">${cat.cat}</div>`;
    cat.items.forEach(item => {
      const key = `pk_${gi}`;
      const done = ST[key] || false;
      packTotal++;
      const el = document.createElement('div');
      el.className = 'citem' + (done ? ' done' : '');
      el.dataset.key = key;
      el.innerHTML = `<div class="cbox">${done ? '✓' : ''}</div><div class="clabel" style="font-size:12px">${item}</div>`;
      el.addEventListener('click', function() {
        this.classList.toggle('done');
        const isDone = this.classList.contains('done');
        this.querySelector('.cbox').textContent = isDone ? '✓' : '';
        ST[this.dataset.key] = isDone;
        updatePackProg();
        saveAll();
      });
      div.appendChild(el);
      gi++;
    });
    grid.appendChild(div);
  });
  updatePackProg();
}
function updatePackProg() {
  const items = document.querySelectorAll('#pack-grid .citem');
  const done = Array.from(items).filter(el => el.classList.contains('done')).length;
  const pct = items.length ? Math.round(done / items.length * 100) : 0;
  document.getElementById('pack-label').textContent = `${done} / ${items.length} 完了（${pct}%）`;
  document.getElementById('pack-bar').style.width = pct + '%';
}

// ===========================
// MISSIONS
// ===========================
function buildMissions() {
  const list = document.getElementById('mission-list');
  missions.forEach((m, i) => {
    const key = `ms_${i}`;
    const done = ST[key] || false;
    const div = document.createElement('div');
    div.className = 'mission' + (done ? ' done' : '');
    div.dataset.key = key;
    div.innerHTML = `
      <div class="micon">${m.emoji}</div>
      <div><div class="mtitle">${m.title}</div><div class="mdesc">${m.desc}</div></div>
      <div class="mcheck">${done ? '✓' : ''}</div>`;
    div.addEventListener('click', function() {
      this.classList.toggle('done');
      const isDone = this.classList.contains('done');
      this.querySelector('.mcheck').textContent = isDone ? '✓' : '';
      ST[this.dataset.key] = isDone;
      updateMissionProg();
      saveAll();
    });
    list.appendChild(div);
  });
  updateMissionProg();
}
function updateMissionProg() {
  const items = document.querySelectorAll('#mission-list .mission');
  const done = Array.from(items).filter(el => el.classList.contains('done')).length;
  const pct = items.length ? Math.round(done / items.length * 100) : 0;
  document.getElementById('mission-label').textContent = `${done} / ${items.length} 達成（${pct}%）`;
  document.getElementById('mission-bar').style.width = pct + '%';
}

// ===========================
// INIT

buildTimeline();
buildFood();
buildBooking();
buildChecklist();
buildPacking();
buildMissions();
initMainMap();
